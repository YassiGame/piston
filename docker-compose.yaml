version: '3.2'

services:
    api:
        image: ghcr.io/engineer-man/piston
        container_name: piston_api
        restart: always
        privileged: true
        environment:
            - PISTON_RUN_CPU_TIME=600000
            - PISTON_COMPILE_CPU_TIME=600000
            - PISTON_RUN_TIMEOUT=600000
            - PISTON_COMPILE_TIMEOUT=600000
        ports:
            - 2000:2000
        volumes:
            - ./data/piston/packages:/piston/packages
        tmpfs:
            - /tmp:exec
